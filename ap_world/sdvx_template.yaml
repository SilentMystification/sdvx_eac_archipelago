# Sound Voltex Archipelago — Player options template
# Copy this file into the Archipelago Players folder and rename it to
# <YourName>.yaml before running ArchipelagoGenerate.exe.

name: YourName   # must match the slot= value in archipelago.ini

game: Sound Voltex

Sound Voltex:
  # How many "Song Clear" items you need to collect to finish.
  # Each song chart you clear sends one location check, which may give you
  # a "Song Clear" item (or an item for another player in a multiworld).
  goal_clears: 30
