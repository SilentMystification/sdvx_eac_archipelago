# Sound Voltex Archipelago — Player options template
# Copy this file into the Archipelago Players folder and rename it to
# <YourName>.yaml before running ArchipelagoGenerate.exe.

name: YourName   # must match the slot= value in archipelago.ini

game: Sound Voltex

Sound Voltex:
  # Win condition mode.
  #   song_clears — accumulate goal_clears clear-type items (one per song cleared)
  #   goal_songs  — collect goal_song_count Goal Song progression items
  goal_mode: song_clears

  # (song_clears mode) Number of clear-type items required to win.
  goal_clears: 30

  # (goal_songs mode) Number of Goal Song items required to win.
  goal_song_count: 5

  # (goal_songs mode) Minimum level folder Goal Song items are placed behind.
  # 0 = no restriction (items can appear anywhere in the multiworld).
  # 1-20 = items are only placed at locations requiring at least that LEVEL folder.
  goal_level: 0
