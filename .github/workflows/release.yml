name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: build.bat
        shell: cmd

      - name: Create release archive
        run: Compress-Archive -Path deploy/* -DestinationPath sdvx-ap-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: sdvx-ap-${{ github.ref_name }}.zip
          generate_release_notes: true
