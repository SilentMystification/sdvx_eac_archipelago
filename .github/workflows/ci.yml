name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: build.bat
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdvx-ap-${{ github.sha }}
          path: deploy/
          if-no-files-found: error

      # ── Release steps run on push events only (not PRs) ─────────────────────

      - name: Create release archive
        if: github.event_name == 'push'
        run: |
          Compress-Archive -Path deploy/* -DestinationPath sdvx-ap.zip
          Copy-Item deploy/version.dll version.dll
          Copy-Item deploy/sdvx_ap_debug.exe sdvx_ap_debug.exe
          Copy-Item deploy/archipelago.ini archipelago.ini
          Copy-Item deploy/generate-apworld.bat generate-apworld.bat
        shell: pwsh

      # Main branch — versioned full release + update latest

      - name: Get next version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          $major = (Get-Content VERSION).Trim()
          $releases = gh release list --json tagName,isPrerelease | ConvertFrom-Json
          $last = $releases | Where-Object { -not $_.isPrerelease -and $_.tagName -match "^$major\.\d+$" } | Select-Object -First 1
          if ($last) {
            $minor = [int]$last.tagName.Split('.')[1]
            $next = "$major.$($minor + 1)"
          } else {
            $next = "$major.0"
          }
          echo "value=$next" >> $env:GITHUB_OUTPUT
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish versioned release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          body: |
            ## Installation

            **Full install** — download `sdvx-ap.zip` and extract all contents into the game's `modules\` folder, then open `archipelago.ini` and set `slot` to your Archipelago slot name.

            **DLL update only** — download `version.dll` and replace the existing file in your `modules\` folder.
          files: |
            sdvx-ap.zip
            version.dll
            sdvx_ap_debug.exe
            archipelago.ini
            generate-apworld.bat
          generate_release_notes: true

      - name: Update latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: |
            ## Installation

            **Full install** — download `sdvx-ap.zip` and extract all contents into the game's `modules\` folder, then open `archipelago.ini` and set `slot` to your Archipelago slot name.

            **DLL update only** — download `version.dll` and replace the existing file in your `modules\` folder.
          files: |
            sdvx-ap.zip
            version.dll
            sdvx_ap_debug.exe
            archipelago.ini
            generate-apworld.bat
          prerelease: true
          make_latest: false

      # Non-main branches — pre-release tagged <branch>-<sha>

      - name: Get branch info
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        id: branch
        run: |
          $sanitized = "${{ github.ref_name }}" -replace '[^a-zA-Z0-9._-]', '-'
          $sha = "${{ github.sha }}".Substring(0, 7)
          echo "tag=$sanitized-$sha" >> $env:GITHUB_OUTPUT
          echo "name=${{ github.ref_name }} @ $sha" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Publish branch pre-release
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.branch.outputs.tag }}
          name: ${{ steps.branch.outputs.name }}
          body: |
            ## Installation

            **Full install** — download `sdvx-ap.zip` and extract all contents into the game's `modules\` folder, then open `archipelago.ini` and set `slot` to your Archipelago slot name.

            **DLL update only** — download `version.dll` and replace the existing file in your `modules\` folder.
          files: |
            sdvx-ap.zip
            version.dll
            sdvx_ap_debug.exe
            archipelago.ini
            generate-apworld.bat
          prerelease: true
          make_latest: false
